language = "C"
header = "/* Generated by cbindgen for zenoh-flat bindings */"
include_guard = "ZENOH_FLAT_H"
autogen_warning = "/* Warning, this file is autogenerated by cbindgen. Don't modify this manually. */"
include_version = true
style = "type"
sort_by = "Name"

# `after_includes` is emitted INSIDE the include guard (unlike `trailer`, which
# sits after `#endif` and would redefine on a second include). We use it to:
#  1. pull in the generated feature-config header (so a single `#include
#     "zenoh_flat.h"` also defines `ZENOH_FLAT_UNSTABLE_API` etc.); and
#  2. define `z_free_array` — the generic deleter for `Vec<T>` array returns
#     (`T* + size_t`): frees each element with the caller-supplied `elem_drop`
#     (`z_free` for `char*`, `z_<x>_drop` for an opaque handle), then the
#     malloc'd block via the universal `z_free`. Plain POD arrays need only
#     `z_free(array)`.
after_includes = '''

#include "zenoh_flat_configure.h"

#define z_free_array(array, len, elem_drop) \
    do { \
        if (array) { \
            for (size_t _z_i = 0; _z_i < (size_t)(len); _z_i++) { \
                elem_drop((array)[_z_i]); \
            } \
            z_free((void *)(array)); \
        } \
    } while (0)'''

[export]
# The generated bindings declare the C allocator (`malloc`/`free`) via an
# `extern "C"` block for the universal `z_free`; don't re-emit them into the
# public header (they already come from <stdlib.h>).
exclude = ["malloc", "free"]

[parse]
parse_deps = false
include = []
exclude = []

[fn]
args = "auto"

[struct]
derive_eq = false
derive_neq = false
